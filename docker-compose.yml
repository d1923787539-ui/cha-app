services:
  postgres:
    image: postgres:16-alpine
    container_name: cha-app-db
    environment:
      POSTGRES_DB: chaapp
      POSTGRES_USER: chauser
      POSTGRES_PASSWORD: chapass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chauser -d chaapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cha-app-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
